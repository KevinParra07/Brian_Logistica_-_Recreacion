<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración - Brian Logística y Recreación</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .admin-login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--azul-principal) 0%, var(--azul-claro) 100%);
            padding: 2rem;
        }

        .login-box {
            background: var(--blanco);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            color: var(--azul-principal);
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .login-box .subtitle {
            text-align: center;
            color: var(--gris);
            margin-bottom: 2rem;
        }

        .login-form .form-group {
            margin-bottom: 1.5rem;
        }

        .login-form label {
            display: block;
            color: var(--azul-principal);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .login-form input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--azul-claro);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--amarillo);
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--amarillo) 0%, var(--amarillo-oscuro) 100%);
            color: var(--azul-principal);
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.4);
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        /* Panel de administración */
        .admin-panel {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: var(--blanco);
            padding: 1.5rem 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .admin-header h1 {
            color: var(--azul-principal);
            font-size: 2rem;
        }

        .btn-logout {
            background: linear-gradient(135deg, var(--naranja), var(--rosa));
            color: var(--blanco);
            padding: 0.75rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4);
        }

        .messages-container {
            background: var(--blanco);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .messages-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--gris-claro);
        }

        .messages-header h2 {
            color: var(--azul-principal);
        }

        .message-count {
            background: var(--amarillo);
            color: var(--azul-principal);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 700;
        }

        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message-card {
            background: var(--gris-claro);
            border-radius: 15px;
            padding: 1.5rem;
            border-left: 5px solid var(--azul-claro);
            transition: all 0.3s ease;
        }

        .message-card:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .message-card.unread {
            border-left-color: var(--amarillo);
            background: linear-gradient(135deg, var(--amarillo-pastel) 0%, var(--gris-claro) 100%);
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .message-sender {
            font-weight: 700;
            color: var(--azul-principal);
            font-size: 1.1rem;
        }

        .message-date {
            color: var(--gris);
            font-size: 0.9rem;
        }

        .message-contact {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .message-contact span {
            color: var(--gris-oscuro);
            font-size: 0.95rem;
        }

        .message-contact strong {
            color: var(--azul-principal);
        }

        .message-body {
            background: var(--blanco);
            padding: 1rem;
            border-radius: 10px;
            color: var(--gris-oscuro);
            line-height: 1.6;
        }

        .message-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 0.5rem 1rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-whatsapp {
            background: #25D366;
            color: var(--blanco);
        }

        .btn-whatsapp:hover {
            background: #128C7E;
        }

        .btn-email {
            background: var(--azul-claro);
            color: var(--blanco);
        }

        .btn-email:hover {
            background: var(--azul-principal);
        }

        .btn-mark-read {
            background: var(--amarillo);
            color: var(--azul-principal);
        }

        .btn-mark-read:hover {
            background: var(--amarillo-oscuro);
        }

        .btn-delete {
            background: var(--rosa);
            color: var(--blanco);
        }

        .btn-delete:hover {
            background: var(--naranja);
        }

        .no-messages {
            text-align: center;
            padding: 3rem;
            color: var(--gris);
        }

        .no-messages-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .message-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .message-contact {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Login Section -->
    <div id="loginSection" class="admin-login-container">
        <div class="login-box">
            <h2>🔐 Administración</h2>
            <p class="subtitle">Brian Logística y Recreación</p>
            
            <div id="errorMessage" class="error-message"></div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required placeholder="Ingresa tu usuario">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
                </div>
                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>
            
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="index.html" style="color: var(--azul-principal); text-decoration: none;">← Volver al sitio web</a>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
        <div class="admin-header">
            <div>
                <h1>📋 Panel de Administración</h1>
                <p style="color: var(--gris);">Bienvenido, <strong id="adminName">Brian García</strong></p>
            </div>
            <a href="#" id="logoutBtn" class="btn-logout">Cerrar Sesión 🚪</a>
        </div>

        <div class="messages-container">
            <div class="messages-header">
                <h2>💌 Mensajes de Contacto</h2>
                <span class="message-count" id="messageCount">0 mensajes</span>
            </div>

            <div id="messagesList" class="messages-list">
                <!-- Los mensajes se cargarán aquí -->
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
